# Configuration for ChangeAnywhere-style pipeline
data:
  raw_root: "src/data/original_OCD_dataset"
  work_root: "src/data/workspace"
  tiles_dir: "{work_root}/tiles"
  masks_dir: "{work_root}/masks"
  synthetic_dir: "{work_root}/synthetic"
  dataset_dir: "{work_root}/dataset"

tiling:
  tile_size: 512
  overlap: 64
  min_nonempty_ratio: 0.02

segmentation:
  active_model: "segformer"  # segformer for background context (ADE20K class IDs)
  fallback:
    slic_segments: 200
  segformer:
    checkpoint: "nvidia/segformer-b5-finetuned-ade-640-640"
    device: "cuda"
  sam:
    checkpoint: "facebook/sam3"
    device: "cuda"
    score_threshold: 0.10
    mask_threshold: 0.5
    scan_tile_size: 1024
    scan_overlap: 128
    # "text" = user lists object categories in detection_prompts (default, current behaviour).
    # "auto" = prompt-free segment-everything mode; labels are dropped because
    #          SAM 3 has no text to attach. Use when target objects are unknown
    #          at runtime (real-time scenarios).
    detection_mode: "text"
    detection_prompts: ["rock", "person", "car", "box", "bag", "bush"]
    detection_score_threshold: 0.30
    auto:
      # Multi-scale: two SAM forward passes (no text) with different box grids.
      multi_scale: true
      multi_scale_runs:
        - [1.28, 13]
        - [1.8, 10]
      merge_dedup_iou: 0.52
      # SegFormer non-terrain CCs as extra SAM input_boxes (no text prompts).
      segformer_seed_boxes: true
      seed_min_cc_pixels: 350
      seed_margin_px: 10
      max_seed_boxes: 14
      # Optional second full-image pass (not implemented): reserved for future coarse grid.
      coarse_pass: false
      # SAM3 auto grid score (box-prompt path); not the same as text; leave unset to use detection_score_threshold.
      auto_detection_score_threshold: 0.22
      # True = SegFormer seed boxes in a separate forward from the box grid (recommended).
      separate_seed_forward: true
      # 0 = all boxes in one forward; 16–32 may reduce peak VRAM on large grids.
      box_forward_batch_size: 0
      # 0 = off. e.g. 5 prints a heartbeat every N tile iterations on large 8K scans.
      log_crop_interval: 0
      # After per-crop filters: keep top-N by objectness per tile; then NMS + MMR across the full image.
      max_detections_per_crop: 10
      max_global_candidates: 150
      nms_iou: 0.35
      use_mmr: true
      mmr_lambda: 0.55
      # Drop tiny bboxes from the MMR pool (full-image px); 0 = off. Favor larger salient regions.
      mmr_min_bbox_area_px: 2200
      points_per_side: 16
      box_scale: 1.35
      dedup_iou: 0.65
      ignore_terrain: true
      min_area_ratio: 0.0025
      max_area_ratio: 0.15
      min_area_ratio_post: 0.0021
      # Reject "uniform soil" specks: min variance of gray inside mask (0-255 scale).
      min_mask_interior_variance: 95.0
      # Drop axis-aligned bboxes with shortest side under this (pixels).
      min_short_side_px: 25
      # Reject masks that are almost entirely SegFormer terrain classes.
      max_terrain_pixel_fraction: 0.85
      # Require a minimum fraction of mask pixels to be non-terrain (complements max_terrain_pixel_fraction).
      min_non_terrain_class_fraction: 0.18
      # L*a*b* ring vs interior: rejects soil-on-soil that only differs in gray (shadows / furrows).
      min_lab_ring_distance: 6.0
      # "and" = gray ring contrast and Lab delta E must both pass (when min_lab_ring_distance > 0).
      color_contrast_mode: "and"
      # Wider halo = stabler mean color of "surroundings" vs a 1-furrow-wide ring.
      ring_contrast_px: 6
      # Optional: require |chroma(ins) - chroma(ring)|; 0 = off. Useful if Lab alone is not enough.
      min_chroma_ring_delta: 0.0
      # 1.0 = off. Lower = stricter: reject if ring vs inside RGB histograms are too similar (soil texture).
      max_ring_histogram_bc: 0.94
      # Drop very low SAM confidence; keep ~0.35 (e.g. shadowed vegetation) if other gates pass.
      min_sam_mask_score: 0.34
      # Optional absolute mask area in pixels; 0 = off. Use with objectness ranking, not as only gate.
      min_mask_area_pixels: 0
      # Mean |grad| on mask boundary band vs eroded core. 0 = off (ranking still uses the ratio in objectness).
      min_edge_interior_grad_ratio: 0.0
      edge_grad_erode: 2
      ring_hist_bin_per_ch: 8
      # Object-like ADE20K ids (null = do not use allowlist; rely on terrain + color gates above)
      object_class_allowlist: null
      min_compactness: 0.22
      min_contrast: 8.0
      objectness_weights:
        area_log_weight: 0.85
        min_area_ratio_target: 0.004
        tiny_area_penalty: 1.2
        non_terrain_weight: 2.5
  # SAM2.1 for eval comparisons only (see scripts/eval_detection_modes.py); not used in generate_pair.
  sam2:
    enabled: false
    checkpoint: "facebook/sam2.1-hiera-base-plus"
    device: "cuda"
    # false = float32 (recommended; AMG NMS in torchvision is most reliable in fp32).
    use_bfloat16: false
    points_per_batch: 32
    max_masks: 45
    min_area_ratio: 0.0001
    max_area_ratio: 0.90
    run_on_vis_resolution: true
    pipeline_kwargs: {}

inpainting:
  backend: "sd2"             # "sd2" | "sd15_realistic" | "sdxl"
  device: "cuda"
  mask_blur_radius: 12
  mask_dilate_px: 8          # minimum dilation (used as a floor)
  # Bbox-aware dilation: scales mask expansion with object size so that
  # shadows/reflections around removed objects are regenerated by SD rather
  # than left visible as a colored silhouette. Effective dilation is:
  #   max(mask_dilate_px, min(object_dilate_max_px, ratio * min(bbox_w, bbox_h)))
  object_dilate_ratio: 0.08  # fraction of object bbox size; set 0 to disable
  object_dilate_max_px: 48   # hard cap on the bbox-aware dilation
  blend_mode: "poisson"      # "poisson" (recommended) or "alpha" (fallback)
  sd2:
    model_id: "sd2-community/stable-diffusion-2-inpainting"
    num_inference_steps: 50
    guidance_scale: 12.0
    strength: 1.0
  sd15_realistic:
    model_id: "Lykon/dreamshaper-8-inpainting"
    num_inference_steps: 40
    guidance_scale: 7.5
    strength: 1.0
  sdxl:
    model_id: "diffusers/stable-diffusion-xl-1.0-inpainting-0.1"
    num_inference_steps: 30
    guidance_scale: 6.0
    strength: 1.0
    max_resolution: 1024     # override registry default if desired

synthetic:
  max_changes: 3             # total object changes per full image
  max_per_label: 1           # max same object type selected (1 = max variety)
  min_object_distance: 2000  # min px between change centroids (spatial spread)
  max_per_tile: 2            # change variants per tile (batch_generate only)
  appearance_prob: 0.20      # 20% appearance, 80% disappearance
  ssim_min: 0.4              # tile batch_generate / generate_synthetic_pair only (local SSIM)
  ssim_max: 0.99             # tile paths only; full-image scripts ignore unless full_image_quality enabled
  seed: 42
  # Optional quality gate for generate_dataset.py / generate_full_image_pair output.
  full_image_quality:
    enabled: false           # if true, drop samples whose local SSIM vs change bbox is out of range
    crop_pad_px: 64          # padding around tight bbox of final change_mask for local SSIM
    local_ssim_min: 0.15    # too low = catastrophic change or misalignment
    local_ssim_max: 0.995   # too high = likely no visible edit

assembler:
  max_changed_tiles: 3
  variance_prefilter: 500
  min_tile_distance: 2000
  max_detections_per_tile: 3
  overview_width: 2048

logging:
  level: INFO

testing:
  test_pair: "pair_0000"
