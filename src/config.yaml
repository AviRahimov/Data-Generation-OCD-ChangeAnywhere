# Configuration for ChangeAnywhere-style pipeline
data:
  raw_root: "src/data/original_OCD_dataset"
  work_root: "src/data/workspace"
  tiles_dir: "{work_root}/tiles"
  masks_dir: "{work_root}/masks"
  synthetic_dir: "{work_root}/synthetic"
  dataset_dir: "{work_root}/dataset"

tiling:
  tile_size: 512
  overlap: 64
  min_nonempty_ratio: 0.02

segmentation:
  active_model: "segformer"  # segformer for consistent ADE20K class IDs (needed by change simulator)
  fallback:
    slic_segments: 200
  segformer:
    checkpoint: "segformer-b5-finetuned-ade-640-640"
    device: "cuda"
  sam:
    checkpoint: "SAM3"
    device: "cuda"
    score_threshold: 0.10
    mask_threshold: 0.5

inpainting:
  model_id: "stable-diffusion-2-inpainting"
  device: "cuda"
  num_inference_steps: 50
  guidance_scale: 20.0
  strength: 1.0

synthetic:
  max_per_tile: 2          # change variants per tile
  appearance_prob: 0.85    # 85% appearance, 15% disappearance
  ssim_min: 0.4            # discard if after is too different from before
  ssim_max: 0.99           # discard if nothing changed
  seed: 42

logging:
  level: INFO

testing:
  test_pair: "pair_0000"
