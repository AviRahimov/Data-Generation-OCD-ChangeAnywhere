# Configuration for ChangeAnywhere-style pipeline
data:
  raw_root: "src/data/original_OCD_dataset"
  work_root: "src/data/workspace"
  tiles_dir: "{work_root}/tiles"
  masks_dir: "{work_root}/masks"
  synthetic_dir: "{work_root}/synthetic"
  dataset_dir: "{work_root}/dataset"

tiling:
  tile_size: 512
  overlap: 64
  min_nonempty_ratio: 0.02

segmentation:
  active_model: "segformer"  # segformer for background context (ADE20K class IDs)
  fallback:
    slic_segments: 200
  segformer:
    checkpoint: "nvidia/segformer-b5-finetuned-ade-640-640"
    device: "cuda"
  sam:
    checkpoint: "facebook/sam3"
    device: "cuda"
    score_threshold: 0.10
    mask_threshold: 0.5
    scan_tile_size: 1024
    scan_overlap: 128
    # "text" = user lists object categories in detection_prompts (default, current behaviour).
    # "auto" = prompt-free segment-everything mode; labels are dropped because
    #          SAM 3 has no text to attach. Use when target objects are unknown
    #          at runtime (real-time scenarios).
    detection_mode: "text"
    detection_prompts: ["rock", "person", "car", "box", "bag", "bush"]
    detection_score_threshold: 0.30
    auto:
      # 16x16 = 256 foreground seed points on each 1024-px scan crop.
      # Higher => slower but finds smaller objects; lower => faster but misses detail.
      points_per_side: 16
      # Drop masks whose dominant SegFormer class is ground/grass/sand/etc.
      # Otherwise "segment everything" returns big terrain blobs that aren't
      # useful objects. Advanced users can set to false for debugging.
      ignore_terrain: true
      # Drop masks smaller/larger than these fractions of the scan crop.
      min_area_ratio: 0.0005
      max_area_ratio: 0.15
      # Advanced tuning: shape regularity (1.0 = circle, 0 = stringy) and
      # how distinct the mask is from its immediate surroundings.
      min_compactness: 0.25
      min_contrast: 8.0

inpainting:
  backend: "sd2"             # "sd2" | "sd15_realistic" | "sdxl"
  device: "cuda"
  mask_blur_radius: 12
  mask_dilate_px: 8          # minimum dilation (used as a floor)
  # Bbox-aware dilation: scales mask expansion with object size so that
  # shadows/reflections around removed objects are regenerated by SD rather
  # than left visible as a colored silhouette. Effective dilation is:
  #   max(mask_dilate_px, min(object_dilate_max_px, ratio * min(bbox_w, bbox_h)))
  object_dilate_ratio: 0.08  # fraction of object bbox size; set 0 to disable
  object_dilate_max_px: 48   # hard cap on the bbox-aware dilation
  blend_mode: "poisson"      # "poisson" (recommended) or "alpha" (fallback)
  sd2:
    model_id: "sd2-community/stable-diffusion-2-inpainting"
    num_inference_steps: 50
    guidance_scale: 12.0
    strength: 1.0
  sd15_realistic:
    model_id: "Lykon/dreamshaper-8-inpainting"
    num_inference_steps: 40
    guidance_scale: 7.5
    strength: 1.0
  sdxl:
    model_id: "diffusers/stable-diffusion-xl-1.0-inpainting-0.1"
    num_inference_steps: 30
    guidance_scale: 6.0
    strength: 1.0
    max_resolution: 1024     # override registry default if desired

synthetic:
  max_changes: 3             # total object changes per full image
  max_per_label: 1           # max same object type selected (1 = max variety)
  min_object_distance: 2000  # min px between change centroids (spatial spread)
  max_per_tile: 2            # change variants per tile (batch_generate only)
  appearance_prob: 0.20      # 20% appearance, 80% disappearance
  ssim_min: 0.4              # tile batch_generate / generate_synthetic_pair only (local SSIM)
  ssim_max: 0.99             # tile paths only; full-image scripts ignore unless full_image_quality enabled
  seed: 42
  # Optional quality gate for generate_dataset.py / generate_full_image_pair output.
  full_image_quality:
    enabled: false           # if true, drop samples whose local SSIM vs change bbox is out of range
    crop_pad_px: 64          # padding around tight bbox of final change_mask for local SSIM
    local_ssim_min: 0.15    # too low = catastrophic change or misalignment
    local_ssim_max: 0.995   # too high = likely no visible edit

assembler:
  max_changed_tiles: 3
  variance_prefilter: 500
  min_tile_distance: 2000
  max_detections_per_tile: 3
  overview_width: 2048

logging:
  level: INFO

testing:
  test_pair: "pair_0000"
